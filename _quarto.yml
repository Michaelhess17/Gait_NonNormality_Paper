project:
  type: manuscript

manuscript:
  article: index.qmd

format:
  html:
    page-layout: full        # removes the narrow article column, uses full browser width
    format-links:
      - pdf
    comments:
      hypothesis: true
    # embed-resources: true   # embeds all resources (images, css, js) into the HTML file
  docx: default
  jats: default
  pdf: default

execute:
  freeze: auto
  warning: false
  out-width: "100%"          # the Quarto option that actually works for Jupyter/Julia outputs
